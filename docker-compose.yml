services:
  postgres:
    image: postgres:16
    container_name: ai-planner-postgres
    environment:
      POSTGRES_DB: ai_planner
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
